<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AuthFlow - Modern SaaS Authentication UI Kit Forgot Password Page">
  <title>Forgot Password - AuthFlow UI Kit</title>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <!-- Custom Subtle Grid Pattern Styles -->
  <style>
    .auth-bg {
      background-color: #f9fafb;
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.8) 0%, rgba(249, 250, 251, 1) 100%),
        url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h20v20H0V0zm20 20h20v20H20V20z' fill='%23e5e7eb' fill-opacity='.18' fill-rule='evenodd'/%3E%3C/svg%3E");
    }
    .link-underline {
      position: relative;
    }
    .link-underline::after {
      content: '';
      position: absolute;
      width: 100%;
      transform: scaleX(0);
      height: 2px;
      bottom: -2px;
      left: 0;
      background-color: #2563eb;
      transform-origin: bottom right;
      transition: transform 0.25s ease-out;
    }
    .link-underline:hover::after {
      transform: scaleX(1);
      transform-origin: bottom left;
    }
  </style>
</head>
<body class="auth-bg text-gray-900 min-h-screen flex flex-col font-sans antialiased">

  <!-- Header / Navigation -->
  <header class="w-full px-6 py-4 flex justify-between items-center absolute top-0 left-0 z-10">
    <a href="index.html" class="flex items-center gap-2.5">
      <img src="assets/logo.svg" alt="AuthFlow Logo" class="w-8 h-8">
      <span class="font-bold text-lg tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">AuthFlow</span>
    </a>
  </header>

  <!-- Main Container -->
  <main class="flex-grow flex items-center justify-center px-4 py-24 sm:px-6 lg:px-8">
    <div class="w-full max-w-[440px] flex flex-col gap-8">
      
      <!-- Card Container -->
      <div class="bg-white rounded-3xl border border-gray-200/80 shadow-2xl shadow-gray-200/50 p-8 sm:p-10 flex flex-col gap-6 transition-all duration-300 hover:shadow-gray-200/80">
        
        <!-- Illustration and Heading Section -->
        <div class="text-center flex flex-col items-center">
          <div class="mb-5">
            <img src="assets/illustrations/forgot-password.svg" alt="Forgot Password Illustration" class="w-28 h-28 object-contain">
          </div>
          <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Forgot password?</h1>
          <p class="text-sm text-gray-500 mt-2 leading-relaxed">No worries, enter your email below and we'll send you instructions to reset your password.</p>
        </div>

        <!-- Form Section -->
        <form action="reset-password.html" method="GET" class="flex flex-col gap-5">
          <!-- Email Input -->
          <div class="flex flex-col gap-1.5">
            <label for="email" class="text-sm font-semibold text-gray-800 flex items-center gap-1">
              Email Address <span class="text-red-500" title="Required">*</span>
            </label>
            <div class="relative group">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-gray-400 group-focus-within:text-blue-600 transition-colors duration-200">
                <!-- Email Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                </svg>
              </span>
              <input type="email" id="email" name="email" required placeholder="name@company.com" 
                class="w-full pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-600/10 focus:border-blue-600 hover:border-gray-300 transition-all duration-200">
            </div>
          </div>

          <!-- Primary Submit Button -->
          <button type="submit" class="w-full flex items-center justify-center gap-2 py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold text-sm shadow-lg shadow-blue-600/15 hover:shadow-blue-600/25 active:scale-[0.99] hover:scale-[1.01] transition-all duration-200 focus:outline-none focus:ring-4 focus:ring-blue-600/20">
            Send reset link
          </button>
        </form>

        <div class="text-center mt-2">
          <a href="index.html" class="inline-flex items-center gap-2 text-sm font-semibold text-blue-600 hover:text-blue-700 transition-colors link-underline">
            <!-- Arrow left icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
            </svg>
            <span>Back to sign in</span>
          </a>
        </div>

      </div>

      <!-- Footer Elements -->
      <footer class="flex flex-col gap-4 text-center mt-4">
        <div class="flex justify-center gap-6 text-xs font-medium text-gray-400">
          <a href="#" class="hover:text-gray-600 transition-colors">Privacy Policy</a>
          <a href="#" class="hover:text-gray-600 transition-colors">Terms of Service</a>
          <a href="#" class="hover:text-gray-600 transition-colors">Contact Support</a>
        </div>
        <p class="text-[11px] font-medium text-gray-400">© 2026 AuthFlow Inc. All rights reserved.</p>
      </footer>

    </div>
  </main>

</body>
</html>
