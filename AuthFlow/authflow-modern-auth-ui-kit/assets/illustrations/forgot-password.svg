<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" class="w-32 h-32 mx-auto">
  <defs>
    <linearGradient id="ill-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF" />
      <stop offset="100%" stop-color="#DBEAFE" />
    </linearGradient>
    <linearGradient id="ill-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <filter id="ill-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1E3A8A" flood-opacity="0.1" />
    </filter>
  </defs>
  <!-- Background circular decorative elements -->
  <circle cx="100" cy="100" r="80" fill="url(#ill-grad-1)" opacity="0.6" />
  <circle cx="100" cy="100" r="60" fill="url(#ill-grad-1)" />
  <circle cx="150" cy="60" r="8" fill="#93C5FD" opacity="0.4" />
  <circle cx="50" cy="140" r="12" fill="#93C5FD" opacity="0.3" />

  <!-- Main Lock Group -->
  <g filter="url(#ill-shadow)">
    <!-- Lock Body -->
    <rect x="70" y="90" width="60" height="50" rx="12" fill="url(#ill-grad-2)" />
    <!-- Lock Shackle -->
    <path d="M80 90 V70 C80 59, 90 50, 100 50 C110 50, 120 59, 120 70 V90" stroke="#2563EB" stroke-width="8" stroke-linecap="round" fill="none" />
    <!-- Key Hole -->
    <circle cx="100" cy="110" r="6" fill="#FFFFFF" />
    <path d="M97 114 L103 114 L105 126 L95 126 Z" fill="#FFFFFF" />
  </g>

  <!-- Sparkles / Key Details -->
  <path d="M140 100 L145 105 L155 105 L147 110 L150 120 L140 113 L130 120 L133 110 L125 105 L135 105 Z" fill="#FBBF24" opacity="0.9" />
  <!-- Question Mark floating -->
  <path d="M55 70 C55 60, 68 60, 68 68 C 68 74, 60 76, 60 82" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" fill="none" />
  <circle cx="60" cy="90" r="2.5" fill="#3B82F6" />
</svg>
